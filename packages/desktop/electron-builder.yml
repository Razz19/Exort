appId: ai.exort.desktop
productName: Exort
asar: true
asarUnpack:
  - out/main/opencode-config/**/*
npmRebuild: false
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
  - resources/**/*
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  target:
    - dmg
    - zip
win:
  icon: resources/icon.ico
  target:
    - nsis
linux:
  category: Development
  icon: resources/exort_logo.png
  target:
    - AppImage
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
